<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajustes </title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Flowbite CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.css" />
</head>
<body class="bg-purple-400 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-2xl bg-white/90 backdrop-blur-sm rounded-3xl shadow-2xl overflow-hidden">
        <div class="p-6 text-center border-b border-purple-100">
            <img src="../images/Valery-Logo.png" alt="Logo" class="w-20 h-20 mx-auto mb-2">
            <h1 class="bg-clip-text text-transparent bg-gradient-to-r from-purple-900 via-purple-600 to-indigo-600 text-4xl md:text-4xl font-extrabold mb-6">Configuración de Cuenta</h1>
        </div>

        <div id="accordion-flush" data-accordion="collapse" data-active-classes="bg-purple-50 text-purple-700" data-inactive-classes="text-gray-500">
            
            <h2 id="accordion-flush-heading-1">
                <button type="button" class="flex items-center justify-between w-full py-5 px-6 font-semibold text-left border-b border-gray-200 gap-3" data-accordion-target="#accordion-flush-body-1" aria-expanded="false" aria-controls="accordion-flush-body-1">
                    <span class="flex items-center gap-3">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                        Actualizar Perfil (Datos Personales)
                    </span>
                    <svg data-accordion-icon class="w-3 h-3 rotate-180 shrink-0" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 10 6">
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5 5 1 1 5"/>
                    </svg>
                </button>
            </h2>

            <div id="accordion-flush-body-1" class="hidden" aria-labelledby="accordion-flush-heading-1">
                <div class="p-6 border-b border-gray-200 bg-white/50">
                    <form id="form-update-data" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        
                        <div class="flex flex-col">
                            <label class="text-[10px] font-bold text-purple-600 uppercase ml-1">Nombre actual</label>
                            <input type="text" id="upd_nombre" class="border-b-2 border-purple-300 focus:border-purple-600 outline-none py-2 bg-transparent text-sm text-gray-700" value="Cargando...">
                        </div>

                        <div class="flex flex-col">
                            <label class="text-[10px] font-bold text-purple-600 uppercase ml-1">Apellido actual</label>
                            <input type="text" id="upd_apellido" class="border-b-2 border-purple-300 focus:border-purple-600 outline-none py-2 bg-transparent text-sm text-gray-700" value="Cargando...">
                        </div>

                        <div class="flex flex-col">
                            <label class="text-[10px] font-bold text-purple-600 uppercase ml-1">Teléfono registrado</label>
                            <input type="tel" id="upd_telefono" class="border-b-2 border-purple-300 focus:border-purple-600 outline-none py-2 bg-transparent text-sm text-gray-700" value="Cargando...">
                        </div>

                        <div class="flex flex-col">
                            <label class="text-[10px] font-bold text-purple-600 uppercase ml-1">Correo electrónico</label>
                            <input type="email" id="upd_email" class="border-b-2 border-purple-300 focus:border-purple-600 outline-none py-2 bg-transparent text-sm text-gray-700" value="Cargando...">
                        </div>

                        <div class="flex flex-col">
                            <label class="text-[10px] font-bold text-purple-600 uppercase ml-1">Ocupación(trabajo)</label>
                            <input type="text" id="upd_ocupacion" class="border-b-2 border-purple-300 focus:border-purple-600 outline-none py-2 bg-transparent text-sm text-gray-700" value="Cargando...">
                        </div>

                        <button type="submit" class="md:col-span-2 bg-purple-600 text-white rounded-xl py-2 hover:bg-purple-700 transition font-bold shadow-md mt-4">
                            Guardar Cambios
                        </button>
                    </form>
                </div>
            </div>

            <h2 id="accordion-flush-heading-2">
                <button type="button" class="flex items-center justify-between w-full py-5 px-6 font-semibold text-left border-b border-gray-200 gap-3" data-accordion-target="#accordion-flush-body-2" aria-expanded="false" aria-controls="accordion-flush-body-2">
                    <span class="flex items-center gap-3">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                        Seguridad y Contraseña
                    </span>
                    <svg data-accordion-icon class="w-3 h-3 rotate-180 shrink-0" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 10 6">
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5 5 1 1 5"/>
                    </svg>
                </button>
            </h2>
            <div id="accordion-flush-body-2" class="hidden" aria-labelledby="accordion-flush-heading-2">
                <div class="p-6 border-b border-gray-200 bg-white/50">
                    <form id="form-update-pass" class="space-y-4">
                        <input type="password" id="current_pass" placeholder="Contraseña Actual" class="w-full border-b-2 border-purple-300 focus:border-purple-600 outline-none py-2 bg-transparent text-sm">
                        <input type="password" id="new_pass" placeholder="Nueva Contraseña" class="w-full border-b-2 border-purple-300 focus:border-purple-600 outline-none py-2 bg-transparent text-sm">
                        <button type="submit" class="w-full border-2 border-purple-600 text-purple-600 rounded-xl py-2 hover:bg-purple-50 transition font-bold">Actualizar Contraseña</button>
                    </form>
                </div>
            </div>

            <h2 id="accordion-flush-heading-3">
                <button type="button" class="flex items-center justify-between w-full py-5 px-6 font-semibold text-left border-b border-gray-200 text-red-500 gap-3" data-accordion-target="#accordion-flush-body-3" aria-expanded="false" aria-controls="accordion-flush-body-3">
                    <span class="flex items-center gap-3">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        Zona de Peligro (Eliminar Cuenta)
                    </span>
                    <svg data-accordion-icon class="w-3 h-3 rotate-180 shrink-0" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 10 6">
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5 5 1 1 5"/>
                    </svg>
                </button>
            </h2>
            <div id="accordion-flush-body-3" class="hidden" aria-labelledby="accordion-flush-heading-3">
                <div class="p-6 bg-red-50 border-b border-gray-200">
                    <p class="text-sm text-red-600 mb-4 italic text-center">¡Atención! Al borrar tu cuenta se perderán todos los datos del paciente y cuidadores asociados.</p>
                    <button id="btn-delete" class="w-full bg-red-600 text-white rounded-xl py-3 hover:bg-red-700 transition font-black shadow-lg uppercase tracking-widest">
                        Borrar mi cuenta permanentemente
                    </button>
                </div>
            </div>
        </div>

        <div class="p-6 text-center">
            <a href="Apli-inicio1.html" class="text-purple-600 hover:underline font-medium text-sm">Volver al Menú Principal</a>
        </div>
    </div>


    <script src="../js/ajustes.js"></script>
    <script src="../js/flowbite.min.js"></script> 

</body>
</html>
